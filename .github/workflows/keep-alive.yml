name: Keep Alive Render
on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 mins (Render Free tier sleeps after 15 mins)
  workflow_dispatch: # Allows manual trigger from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          # Use the RENDER_URL secret to hit the health endpoint
          if [ -z "${{ secrets.RENDER_URL }}" ]; then
            echo "RENDER_URL secret is not set. Please add it to your GitHub Repo Secrets."
            exit 1
          fi
          curl -I -s -f "${{ secrets.RENDER_URL }}" || (echo "Failed to ping Render. Is the URL correct?" && exit 1)
          echo "Render service pinged successfully!"
